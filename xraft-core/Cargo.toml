[package]
name = "xraft-core"
version = "0.1.0"
edition.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
bytes = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["sync", "time", "rt"] }

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
bytes = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "macros"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "sync", "fs"] }
