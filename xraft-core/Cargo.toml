[package]
name = "xraft-core"
edition.workspace = true
version.workspace = true

[dependencies]
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }
serde = { version = "1", features = ["derive"] }
bincode = "1"
bytes = { version = "1", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"

[lints]
workspace = true
