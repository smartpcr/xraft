[package]
name = "xraft-core"
version = "0.1.0"
edition = "2021"
description = "Core traits and types for the xraft Raft protocol implementation"

[dependencies]
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = { version = "1", features = ["serde"] }
tracing = "0.1"
thiserror = "2"
async-trait = "0.1"
rand = "0.8"
