[package]
name = "xraft-core"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
bincode = "1"
bytes = "1"
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
bytes = { version = "1", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }

[lints]
workspace = true
