[package]
name = "xraft-core"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
bincode = "1"
bytes = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
