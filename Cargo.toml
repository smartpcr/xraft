[workspace]
members = ["xraft-core"]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
bincode = "1"
bytes = { version = "1", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
crc32c = "0.6"
tempfile = "3"
