[package]
name = "xraft-storage"
edition.workspace = true
version.workspace = true
license.workspace = true

[dependencies]
xraft-core = { path = "../xraft-core" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "sync", "io-util", "rt", "macros"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
tempfile = "3"
