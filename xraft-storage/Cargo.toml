[package]
name = "xraft-storage"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[dependencies]
xraft-core = { path = "../xraft-core" }
async-trait = "0.1"
bincode = "1"
bytes = "1"
crc32c = "0.6"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
